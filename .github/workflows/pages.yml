# Deploy the marketing landing page (site/) to GitHub Pages.
#
# ── AUTO-DEPLOYS ON SITE MERGES (#400) ───────────────────────────────────────
# A merge to main that touches site/ (or this workflow) publishes automatically —
# site updates are routine content work, not operator-gated (the manual-only
# design predated Pages being live and required a hand dispatch for every copy
# change). Manual dispatch remains as a fallback/re-publish path. Publishing
# stays FAIL-CLOSED until Pages is enabled: with no Pages source configured the
# deploy step has nowhere to publish and errors — it cannot accidentally make
# anything public.
#
# ── THE ONE STEP THE OPERATOR TAKES TO ENABLE PAGES ──────────────────────────
#   GitHub repo → Settings → Pages → "Build and deployment"
#     → Source: **GitHub Actions**
# ─────────────────────────────────────────────────────────────────────────────

name: Deploy landing page (GitHub Pages)

on:
  workflow_dispatch: {}   # manual fallback / re-publish
  push:
    branches: [main]
    paths:
      - "site/**"
      - ".github/workflows/pages.yml"

# Least-privilege token scoped for Pages deployment.
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment; don't cancel an in-progress publish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

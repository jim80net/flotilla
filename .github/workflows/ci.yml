name: CI

# Build, vet, format-check, and race-test every push to main and every PR, so a
# build break, a vet finding, an unformatted file, or a failing test is caught
# before merge. Until this existed, flotilla PRs ran only Socket Security + cubic
# — none of which compile or test the Go code (issue #16).
on:
  push:
    branches: [main]
  pull_request:

# Least privilege: CI only needs to read the repo.
permissions:
  contents: read

# A newer push to the same branch/PR cancels the in-flight run.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      # Actions are pinned to immutable commit SHAs (supply-chain hardening — a
      # moving tag like @v4 could be repointed to malicious code); the trailing
      # comment records the human-readable version for readability/upgrades.
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          # Track the version in go.mod (the `go` directive) so CI never drifts
          # from the module's declared toolchain.
          go-version-file: go.mod
          # actions/setup-go caches the module and build caches by default.

      - name: gofmt (fail on any unformatted file)
        run: |
          unformatted="$(gofmt -l .)"
          if [ -n "$unformatted" ]; then
            echo "These files are not gofmt-clean:"
            echo "$unformatted"
            echo "Run: gofmt -w ."
            exit 1
          fi

      - name: Build
        run: go build ./...

      # The Opus codec is the one planned CGO dependency in the voice path and is isolated
      # behind the `voiceopus` build tag (the libopus impl lands in internal/voice in §3b;
      # today only the //go:build !voiceopus stub ships). The core flotilla binary must
      # build with NO CGO and NO libopus — this step pins that invariant: once the
      # build-tagged libopus code lands, a stray CGO import in the core (or a codec file
      # missing its build tag) fails CI here instead of silently coupling the core to
      # libopus. ubuntu-latest has gcc, so the default `go build` above would happily link
      # CGO and hide such a regression. NOTE (§3b): when opus_cgo.go lands, add a matching
      # `-tags voiceopus` build step so the REAL codec path is compiled in CI too — see
      # tasks.md §6.1.
      - name: Core builds without CGO (libopus isolation)
        run: CGO_ENABLED=0 go build ./...

      - name: Vet
        run: go vet ./...

      - name: Test (race detector)
        run: go test -race ./...

  # The voice process is the ONE binary built with `-tags voiceopus` (CGO + libopus):
  # opus_cgo.go is a first-party binding that `#cgo pkg-config: opus` → SYSTEM libopus on
  # every architecture (ubuntu-latest is amd64, so libopus-dev IS load-bearing here — there
  # is no vendored fallback). This job is the counterpart to the core's "builds without CGO"
  # guard — it compiles AND tests the real Opus codec path on amd64 so it can never silently
  # rot (a build/test break in the tagged code is invisible to the default build above). The
  # default job proves the core needs none of this.
  voice-opus-codec:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version-file: go.mod

      - name: Install libopus (voice codec host dependency)
        run: sudo apt-get update && sudo apt-get install -y libopus-dev

      - name: Build the voice codec (-tags voiceopus, CGO + libopus)
        run: CGO_ENABLED=1 go build -tags voiceopus ./...

      - name: Test the voice build (codec round-trip + voice command, race detector)
        run: CGO_ENABLED=1 go test -tags voiceopus -race ./...

  # The public/private boundary guard (docs/private-public-boundary.md): a
  # deployment-specific identifier must never reach the public tree or open
  # issues/PRs. The guard's BUILT-IN patterns (home paths, webhook URLs, secret
  # shapes) run with no config; THIS deployment's own denylist is supplied via the
  # FLOTILLA_PRIVATE_DENYLIST repo secret so the vocabulary is never committed. A
  # fork with no secret set still gets the generic protection.
  private-boundary:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: read
      pull-requests: read
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - name: Boundary guard (tree + open issues/PRs)
        env:
          # Empty when the secret is unset (a fork) → generic patterns only.
          FLOTILLA_PRIVATE_DENYLIST: ${{ secrets.FLOTILLA_PRIVATE_DENYLIST }}
          GH_TOKEN: ${{ github.token }}
        run: bash scripts/check-private-boundary.sh --issues

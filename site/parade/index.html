<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>flotilla — Independence Day parade</title>
  <meta name="description" content="Set your agents free — a drop-in chief of staff for the AI coding agents you already run. The flotilla product parade, June 2 to July 4, 2026." />
  <meta property="og:title" content="flotilla — Set Your Agents Free" />
  <meta property="og:description" content="Independence Day parade: one hub, one month, 240 commits — the story of an open-source fleet coordinator." />
  <meta property="og:type" content="website" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../styles.css" />
  <link rel="stylesheet" href="./parade.css" />
</head>
<body class="parade-body">
  <div class="bg-grid" aria-hidden="true"></div>
  <div class="bg-grain" aria-hidden="true"></div>

  <section id="pd-deck" class="pd-deck" aria-label="Parade slides" hidden>
    <div class="pd-deck-bar">
      <span id="pd-deck-date" class="pd-deck-date"></span>
      <span id="pd-counter" class="pd-counter" aria-live="polite"></span>
      <button id="pd-close" class="pd-close" type="button" aria-label="All parades (Escape)">▦ all parades</button>
    </div>
    <div id="pd-stage" class="pd-stage">
      <button id="pd-prev" class="pd-nav pd-prev" type="button" aria-label="Previous slide">‹</button>
      <article id="pd-slide" class="pd-slide" tabindex="0"></article>
      <button id="pd-next" class="pd-nav pd-next" type="button" aria-label="Next slide">›</button>
    </div>
  </section>

  <section id="pd-list-view" class="pd-list-view" aria-label="Parades, newest first" hidden>
    <header class="parade-nav">
      <a class="brand" href="../">
        <span class="brand-mark" aria-hidden="true">
          <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="1.5">
            <circle cx="12" cy="12" r="2.4" />
            <circle cx="4" cy="6" r="1.5" /><circle cx="20" cy="6" r="1.5" />
            <circle cx="4" cy="18" r="1.5" /><circle cx="20" cy="18" r="1.5" />
            <path d="M10 11 5 7M14 11 19 7M10 13 5 17M14 13 19 17" stroke-opacity=".8" />
          </svg>
        </span>
        <span class="brand-name">flotilla</span>
        <span class="parade-nav-label">parade</span>
      </a>
      <nav class="parade-topnav" aria-label="Site"><a class="pd-topback" href="../">← Landing page</a></nav>
    </header>
    <main class="parade-wrap">
      <p class="parade-intro muted">The flotilla product parade — what shipped in the open-source repo. Tap a date to open its deck.</p>
      <div id="pd-list" class="pd-list"></div>
    </main>
  </section>

  <script src="./parade.js" defer></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="robots" content="noindex,nofollow" />
  <script src="/static/theme.js"></script>
  <title>flotilla — parade</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/static/dash.css" />
</head>
<body class="parade-body">
  <div class="bg-grid" aria-hidden="true"></div>
  <div class="bg-grain" aria-hidden="true"></div>

  <!-- DECK view: one slide at a time (arrows / tap / swipe / counter; Esc → the list) -->
  <section id="pd-deck" class="pd-deck" aria-label="Parade slides" hidden>
    <div class="pd-deck-bar">
      <span id="pd-deck-date" class="pd-deck-date"></span>
      <span id="pd-counter" class="pd-counter" aria-live="polite"></span>
      <button class="theme-toggle" type="button" data-theme-toggle aria-label="Toggle color theme"><span data-theme-label>Theme</span></button>
      <button id="pd-close" class="pd-close" type="button" aria-label="All parades (Escape)">▦ all parades <span id="pd-global-unread" class="pd-unread-dot" aria-label="Unread parade replies" hidden></span></button>
    </div>
    <div id="pd-stage" class="pd-stage">
      <button id="pd-prev" class="pd-nav pd-prev" type="button" aria-label="Previous slide">‹</button>
      <article id="pd-slide" class="pd-slide" tabindex="0"></article>
      <button id="pd-next" class="pd-nav pd-next" type="button" aria-label="Next slide">›</button>
    </div>
  </section>

  <!-- LIST view: every parade newest-first (the progression); tap one to open its deck -->
  <section id="pd-list-view" class="pd-list-view" aria-label="Parades, newest first" hidden>
    <header class="bar">
      <div class="brand">
        <svg class="brand-mark" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
          <circle cx="12" cy="12" r="3"/>
          <line x1="12" y1="9" x2="12" y2="3" stroke-linecap="round"/>
          <line x1="15" y1="12" x2="21" y2="12" stroke-linecap="round"/>
          <line x1="12" y1="15" x2="12" y2="21" stroke-linecap="round"/>
          <line x1="9"  y1="12" x2="3"  y2="12" stroke-linecap="round"/>
          <circle cx="12" cy="2"  r="2"/>
          <circle cx="22" cy="12" r="2"/>
          <circle cx="12" cy="22" r="2"/>
          <circle cx="2"  cy="12" r="2"/>
        </svg>
        <div class="brand-text"><span class="brand-name">flotilla</span><span class="brand-dash">parades</span></div>
      </div>
      <nav class="parade-topnav" aria-label="Site"><button class="theme-toggle" type="button" data-theme-toggle aria-label="Toggle color theme"><span data-theme-label>Theme</span></button><a class="pd-topback" href="/">← Dashboard</a></nav>
    </header>
    <main class="parade-wrap">
      <p class="parade-intro muted">Every parade, newest first — the fleet's progress over time. Tap one to open its deck.</p>
      <div id="pd-list" class="pd-list"></div>
    </main>
  </section>

  <script src="/static/parade.js"></script>
</body>
</html>
